<script>
let hp = 5;
const maxHP = 5;

function updateHearts() {
  const heartDiv = document.getElementById("hearts");
  let heartsText = "";

  for (let i = 0; i < maxHP; i++) {
    heartsText += (i < hp) ? "✦" : "✧";
  }

  heartDiv.innerHTML = heartsText;
}

function takeDamage(amount) {
  hp -= amount;
  if (hp < 0) hp = 0;

  updateHearts();

  if (hp === 0) {
    alert("Game Over");
  }
}

function heal(amount) {
  hp += amount;
  if (hp > maxHP) hp = maxHP;

  updateHearts();
}

window.onload = updateHearts;
</script>



<script>
function typeText(text) {
  const dialog = document.getElementById("dialog");
  dialog.innerHTML = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      if (text.charAt(i) === "\n") {
        dialog.innerHTML += "<br>"; 
      } else {
        dialog.innerHTML += text.charAt(i);
      }
      i++;
      setTimeout(typing, 25);
    }
  }
  typing();
}

you fell a sleep. . . suddenly a LOUD noise woke you up. the ground is shaking...`);
</script>
